{% extends "base.html" %}
{% block content %}
<h1>Catálogo</h1>

<div class="grid">
  {% for p in productos %}
    <div class="card-wrap">
      <div class="card">

        <!-- Herradura arriba izquierda -->
        <svg class="horseshoe top-left" viewBox="0 0 100 110" xmlns="http://www.w3.org/2000/svg">
          <path d="M50 8 C25 8,8 26,8 52 C8 72,18 88,32 97 L32 82 C22 74,18 64,18 52 C18 31,32 18,50 18 C68 18,82 31,82 52 C82 64,78 74,68 82 L68 97 C82 88,92 72,92 52 C92 26,75 8,50 8 Z" fill="#2d5a56"/>
          <rect x="26" y="88" width="14" height="16" rx="3" fill="#2d5a56"/>
          <rect x="60" y="88" width="14" height="16" rx="3" fill="#2d5a56"/>
          <circle cx="22" cy="38" r="4" fill="white"/>
          <circle cx="18" cy="55" r="4" fill="white"/>
          <circle cx="22" cy="72" r="4" fill="white"/>
          <circle cx="78" cy="38" r="4" fill="white"/>
          <circle cx="82" cy="55" r="4" fill="white"/>
          <circle cx="78" cy="72" r="4" fill="white"/>
        </svg>

        <!-- Herradura abajo derecha -->
        <svg class="horseshoe bottom-right" viewBox="0 0 100 110" xmlns="http://www.w3.org/2000/svg">
          <path d="M50 8 C25 8,8 26,8 52 C8 72,18 88,32 97 L32 82 C22 74,18 64,18 52 C18 31,32 18,50 18 C68 18,82 31,82 52 C82 64,78 74,68 82 L68 97 C82 88,92 72,92 52 C92 26,75 8,50 8 Z" fill="#2d5a56"/>
          <rect x="26" y="88" width="14" height="16" rx="3" fill="#2d5a56"/>
          <rect x="60" y="88" width="14" height="16" rx="3" fill="#2d5a56"/>
          <circle cx="22" cy="38" r="4" fill="white"/>
          <circle cx="18" cy="55" r="4" fill="white"/>
          <circle cx="22" cy="72" r="4" fill="white"/>
          <circle cx="78" cy="38" r="4" fill="white"/>
          <circle cx="82" cy="55" r="4" fill="white"/>
          <circle cx="78" cy="72" r="4" fill="white"/>
        </svg>

        <h3>{{ p["nombre"] }}</h3>

        {% if p["imagen_url"] %}
          <img src="{{ p['imagen_url'] }}" alt="{{ p['nombre'] }}">
        {% else %}
          <div class="img-placeholder">Sin imagen</div>
        {% endif %}

        <p class="muted">{{ p["descripcion"] or "" }}</p>

        <div class="row">
          <a class="btn" href="{{ url_for('producto', producto_id=p['id']) }}">Ver</a>
          <form method="post" action="{{ url_for('carrito_agregar') }}">
            <input type="hidden" name="producto_id" value="{{ p['id'] }}">
            <input class="qty" type="number" name="cantidad" min="1" value="1">
            <button class="btn primary" type="submit">Agregar</button>
          </form>
        </div>

      </div>
    </div>
  {% endfor %}
</div>
{% endblock %}
